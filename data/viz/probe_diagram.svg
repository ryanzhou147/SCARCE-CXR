<svg width="300" height="425" viewBox="0 0 300 425" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: Helvetica, Arial, sans-serif; }
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="8" markerHeight="8" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#cbd5e1"/>
    </marker>
    <marker id="ah2" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="8" markerHeight="8" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="150" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Linear Probe</text>
  <text x="150" y="42" text-anchor="middle" font-size="11" fill="#64748b">pure representation quality</text>

  <!-- Conv1 -->
  <rect x="35" y="55" width="210" height="40" rx="5" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="60" y="79" font-size="14" fill="#93c5fd">❄</text>
  <text x="82" y="80" font-size="13" fill="#64748b">Conv1 + BN</text>
  <line x1="140" y1="95" x2="140" y2="107" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Layer 1 -->
  <rect x="35" y="108" width="210" height="40" rx="5" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="60" y="132" font-size="14" fill="#93c5fd">❄</text>
  <text x="82" y="133" font-size="13" fill="#64748b">Layer 1</text>
  <line x1="140" y1="148" x2="140" y2="160" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Layer 2 -->
  <rect x="35" y="161" width="210" height="40" rx="5" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="60" y="185" font-size="14" fill="#93c5fd">❄</text>
  <text x="82" y="186" font-size="13" fill="#64748b">Layer 2</text>
  <line x1="140" y1="201" x2="140" y2="213" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Layer 3 -->
  <rect x="35" y="214" width="210" height="40" rx="5" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="60" y="238" font-size="14" fill="#93c5fd">❄</text>
  <text x="82" y="239" font-size="13" fill="#64748b">Layer 3</text>
  <line x1="140" y1="254" x2="140" y2="266" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Layer 4 -->
  <rect x="35" y="267" width="210" height="40" rx="5" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="60" y="291" font-size="14" fill="#93c5fd">❄</text>
  <text x="82" y="292" font-size="13" fill="#64748b">Layer 4</text>

  <!-- Right bracket: all backbone frozen -->
  <polyline points="252,55 261,55 261,307 252,307" stroke="#cbd5e1" stroke-width="1.5" fill="none"/>
  <text transform="translate(276,181) rotate(90)" text-anchor="middle" font-size="10" fill="#94a3b8">backbone frozen</text>

  <!-- Arrow to head -->
  <line x1="140" y1="307" x2="140" y2="352" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ah2)"/>
  <text x="152" y="327" font-size="10" fill="#94a3b8">2048-dim</text>
  <text x="152" y="340" font-size="10" fill="#94a3b8">features</text>

  <!-- Linear Head -->
  <rect x="65" y="355" width="150" height="40" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="140" y="380" text-anchor="middle" font-size="13" fill="#15803d">Linear Head</text>

  <text x="140" y="410" text-anchor="middle" font-size="10" fill="#64748b">logistic regression, trained</text>
</svg>
